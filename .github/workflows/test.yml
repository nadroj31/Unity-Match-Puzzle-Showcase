# ─────────────────────────────────────────────────────────────────────────────
# test.yml  —  Run Unity Edit Mode tests on every push and pull request
#
# What this does:
#   1. Spins up a Linux virtual machine on GitHub's servers (free)
#   2. Checks out the repository code
#   3. Starts Unity 6 inside a Docker container (GameCI ubuntu image)
#   4. Activates Unity using the license stored in GitHub Secrets
#   5. Runs all 25 Edit Mode tests (BindableProperty, GoalTracker, BoardLogic)
#   6. Reports pass / fail — a red result blocks a pull request from merging
#   7. Uploads the XML test report as a downloadable artifact
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   UNITY_LICENSE   — full content of C:\ProgramData\Unity\Unity_lic.ulf
#   UNITY_EMAIL     — your Unity account email
#   UNITY_PASSWORD  — your Unity account password
#
# See activation.yml for one-time setup instructions.
# ─────────────────────────────────────────────────────────────────────────────

name: Run Unity Tests

on:
  push:
    branches: [main]          # run whenever code lands on main
  pull_request:
    branches: [main]          # run on every PR targeting main; blocks merge if red

jobs:
  test:
    name: Edit Mode Tests (Unity 6000.3.11f1)
    runs-on: ubuntu-latest

    steps:
      # ── 1. Check out the repository ────────────────────────────────────────
      - name: Check out repository
        uses: actions/checkout@v4

      # ── 2. Run Unity Edit Mode tests ───────────────────────────────────────
      # GameCI pulls the ubuntu-6000.3.11f1 Docker image, activates the Unity
      # license from secrets, then runs all tests in the Tests.EditMode assembly.
      - name: Run Edit Mode tests
        id: tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE:  ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion:  6000.3.11f1
          testMode:      EditMode      # only run Edit Mode tests (no Play Mode)
          artifactsPath: test-results  # folder where XML reports are saved
          githubToken:   ${{ secrets.GITHUB_TOKEN }}  # built-in token, no setup needed

      # ── 3. Upload test results ──────────────────────────────────────────────
      # Upload the XML report even if tests fail so you can inspect failures.
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()                   # upload even when the test step fails
        with:
          name: EditMode-test-results
          path: ${{ steps.tests.outputs.artifactsPath }}
