# ─────────────────────────────────────────────────────────────────────────────
# activation.yml  —  ONE-TIME USE: generate a Unity activation request file
#
# Purpose:
#   Unity requires a license to run in a headless (Docker) environment.
#   This workflow produces a .alf file (Activation License File) that you
#   upload to Unity's website in exchange for a .ulf (Unity License File).
#   Once you have stored the .ulf content as a GitHub Secret, this workflow
#   is no longer needed.
#
# How to use:
#   1. Go to Actions tab → "Acquire Unity activation file" → Run workflow
#   2. Download the .alf artifact from the completed run
#   3. Visit https://license.unity3d.com/manual
#   4. Upload the .alf → download the .ulf that Unity gives you
#   5. Open the .ulf in a text editor, copy ALL the content
#   6. Go to GitHub repo → Settings → Secrets and variables → Actions
#   7. Create three secrets:
#        UNITY_LICENSE  →  paste the full .ulf file content
#        UNITY_EMAIL    →  your Unity account email
#        UNITY_PASSWORD →  your Unity account password
#   8. The test.yml workflow will now work on every push / PR.
# ─────────────────────────────────────────────────────────────────────────────

name: Acquire Unity activation file

on:
  workflow_dispatch: {}   # manual trigger only — click "Run workflow" in Actions tab

jobs:
  activation:
    name: Request activation file (.alf)
    runs-on: ubuntu-latest
    steps:
      - name: Request manual activation file
        id: getActivationFile
        uses: game-ci/unity-request-activation-file@v2
        with:
          unityVersion: 6000.3.11f1

      - name: Upload activation file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unity_v6000.3.11f1.alf
          path: ${{ steps.getActivationFile.outputs.filePath }}
          # Download this file from the Actions run page after the job completes.
