# ─────────────────────────────────────────────────────────────────────────────
# activation.yml  —  HOW TO SET UP UNITY LICENSE FOR CI (read-only reference)
#
# The old game-ci/unity-request-activation-file action is deprecated.
# The .ulf license file already exists on your local machine after you
# activate Unity Hub — no workflow run is needed to obtain it.
#
# ONE-TIME SETUP (do this once, never again):
#
#   1. On your development machine, open File Explorer and navigate to:
#        C:\ProgramData\Unity\Unity_lic.ulf
#      (ProgramData is a hidden folder — paste the path directly in Explorer)
#
#   2. Open Unity_lic.ulf with Notepad. Select All → Copy.
#
#   3. Go to your GitHub repo:
#        Settings → Secrets and variables → Actions → New repository secret
#
#   4. Create these three secrets:
#        UNITY_LICENSE  →  paste the full content of Unity_lic.ulf
#        UNITY_EMAIL    →  your Unity account email address
#        UNITY_PASSWORD →  your Unity account password
#
#   5. That's it. The test.yml workflow will now activate Unity automatically
#      on every push and pull request using these secrets.
#
# NOTE: This file exists only as documentation. It contains no runnable jobs.
# ─────────────────────────────────────────────────────────────────────────────
